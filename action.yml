name: "Codex Reviewer"
description: "AI-powered PR review that provides summary, code improvement suggestions, and bug detection as a comment"
author: "P2ACHAI"
branding:
  icon: "eye"
  color: "blue"
inputs:
  github_token:
    description: "GitHub token used for posting review comments on PRs"
    required: true
  openai_api_key:
    description: "OpenAI API Key for accessing AI models"
    required: true
  label:
    description: "Label name that triggers the review action (e.g. codex-review)"
    required: true
    default: "codex-review"
  spec_label:
    description: "Label for spec+tests review"
    required: false
    default: "codex-review"
  perfsec_label:
    description: "Label for performance/security review"
    required: false
    default: "codex-review-perf"
  bug_label:
    description: "Label for correctness/bug review"
    required: false
    default: "codex-review-bug"
  model:
    description: "OpenAI model to use for code review (e.g. codex-mini-latest, o4-mini, gpt-4, etc.)"
    required: false
    default: "gpt-5-mini"
  codex_version:
    description: "Pinned @openai/codex version to install"
    required: false
    default: "0.115.0-alpha.27"
  language:
    description: "Language for the review output (e.g. english, korean, japanese, etc.)"
    required: false
    default: "english"
  custom_prompt:
    description: "Optional custom prompt to override the default review prompt"
    required: false
    default: ""
  enable_multi_agent:
    description: "Deprecated. Multi-agent review is no longer used."
    required: false
    default: "false"
  agents_path:
    description: "Deprecated. Multi-agent agent definition path is no longer used."
    required: false
    default: "agents.json"
  clickup_api_token:
    description: "ClickUp API token for fetching spec/task content"
    required: false
    default: ""
  clickup_url:
    description: "ClickUp task URL for spec compliance agent"
    required: false
    default: ""
  clickup_team_id:
    description: "ClickUp team/workspace ID (required when using custom task IDs)"
    required: false
    default: ""
  clickup_custom_task_ids:
    description: "Whether ClickUp uses custom task IDs (true/false)"
    required: false
    default: "false"
  spec_source:
    description: "Spec URL source: input, comment, or auto"
    required: false
    default: "auto"
  spec_comment_marker:
    description: "Marker used to find spec URL in PR comments"
    required: false
    default: "SPEC:"
runs:
  using: "composite"
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "22"

    - name: Review with Codex
      shell: bash
      env:
        OPENAI_API_KEY: ${{ inputs.openai_api_key }}
        CODEX_API_KEY: ${{ inputs.openai_api_key }}
        GITHUB_TOKEN: ${{ inputs.github_token }}
      run: |
        echo "Installing Codex"
        npm install -g @openai/codex@${{ inputs.codex_version }}

        export ACTION_DIR="$GITHUB_ACTION_PATH"
        export MODEL="${{ inputs.model }}"
        export LANGUAGE="${{ inputs.language }}"
        export CUSTOM_PROMPT="${{ inputs.custom_prompt }}"
        export CLICKUP_URL_INPUT="${{ inputs.clickup_url }}"
        export CLICKUP_API_TOKEN="${{ inputs.clickup_api_token }}"
        export CLICKUP_TEAM_ID="${{ inputs.clickup_team_id }}"
        export CLICKUP_CUSTOM_TASK_IDS="${{ inputs.clickup_custom_task_ids }}"
        export SPEC_SOURCE="${{ inputs.spec_source }}"
        export SPEC_MARKER="${{ inputs.spec_comment_marker }}"
        export SPEC_LABEL="${{ inputs.spec_label }}"
        export PERFSEC_LABEL="${{ inputs.perfsec_label }}"
        export BUG_LABEL="${{ inputs.bug_label }}"
        export DEFAULT_LABEL="${{ inputs.label }}"
        export TRIGGER_LABEL="${{ github.event.label.name }}"
        export PR_NUMBER="${{ github.event.pull_request.number }}"
        export BASE_BRANCH="${{ github.event.pull_request.base.ref }}"
        export HEAD_BRANCH="${{ github.event.pull_request.head.ref }}"
        export GITHUB_TOKEN="${{ inputs.github_token }}"

        "$GITHUB_ACTION_PATH/scripts/run_review.sh"

    - name: Comments on PR
      uses: peter-evans/create-or-update-comment@v3
      with:
        token: ${{ inputs.github_token }}
        issue-number: ${{ github.event.pull_request.number }}
        body-file: review.md
